<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio & Security | Intelligence Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0c10;
            --card: #161b22;
            --text: #c9d1d9;
            --header: #f0f6fc;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* --- Header Minimalista --- */
        header {
            position: relative;
            height: 400px; /* Altura reduzida para focar no olho */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            border-bottom: 1px solid var(--accent-blue);
        }

        .header-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: 1;
            object-fit: cover;
            opacity: 0.25;
            filter: brightness(0.4) contrast(1.4);
        }

        .header-content {
            position: relative;
            z-index: 2;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo { 
            font-family: 'Poppins', sans-serif; 
            font-size: 1.6rem; 
            color: var(--header); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .logo span { color: var(--accent-blue); }

        /* --- Banner de Status Real --- */
        .status-bar {
            background: #0d1117;
            border-bottom: 1px solid rgba(88, 166, 255, 0.2);
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #8b949e;
            overflow-x: auto;
        }
        .status-item .label { color: var(--accent-blue); font-weight: bold; }
        .status-item .val { color: #fff; margin-left: 5px; }

        /* --- Container Principal --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        h2.section-title {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
