<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Designer & Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000; color: #fff; font-family: 'Orbitron', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            position: relative;
        }

        /* ANIMAÇÃO CHROMA (RGB) */
        @keyframes chroma {
            0% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
            50% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
            100% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        }
        .chroma { animation: chroma 4s infinite linear; }

        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* LOGIN */
        #login-screen { background: #000; z-index: 999; justify-content: center; }
        .login-box { background: #0a0a0a; padding: 40px; border: 1px solid #222; border-radius: 12px; text-align: center; width: 320px; }

        /* HUB */
        #hub-screen { background: #050505; z-index: 10; padding: 30px; justify-content: flex-start; opacity: 0; pointer-events: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin-top: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center; }
