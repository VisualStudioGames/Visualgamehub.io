<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualStudioAndSecurity | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .border-neon {
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .color-shift {
            animation: colorChange 8s infinite linear;
        }

        @keyframes colorChange {
            0%, 100% {
                color: #00ff00;
                text-shadow: 0 0 10px #00ff00;
            }

            33% {
                color: #00ffff;
                text-shadow: 0 0 10px #00ffff;
            }

            66% {
                color: #ff00ff;
                text-shadow: 0 0 10px #ff00ff;
            }
        }

        .nav-btn {
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            text-align: center;
            display: block;
        }

            .nav-btn:hover {
                border-color: #00ff00;
                color: #00ff00;
            }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col items-center justify-center">

    <h1 class="text-3xl md:text-5xl font-black color-shift mb-6 tracking-widest text-center">VisualStudioAndSecurity</h1>

    <div class="flex flex-wrap justify-center gap-2 mb-10 border-y border-white/10 py-4 w-full max-w-4xl">
        <a href="exemplo1.html" class="nav-btn px-4 py-1 text-[10px]">LP_01</a>
        <a href="exemplo2.html" class="nav-btn px-4 py-1 text-[10px]">LP_02</a>
        <a href="exemplo3.html" class="nav-btn px-4 py-1 text-[10px]">LP_03</a>
        <a href="exemplo4.html" class="nav-btn px-4 py-1 text-[10px]">LP_04</a>
        <a href="exemplo5.html" class="nav-btn px-4 py-1 text-[10px]">LP_05</a>
        <a href="exemplo6.html" class="nav-btn px-4 py-1 text-[10px]">LP_06</a>
        <a href="https://github.com/VisualStudioandSecurity" target="_blank" class="nav-btn px-4 py-1 text-[10px] border-blue-500 text-blue-400">FICHA</a>
        <a href="https://wa.me/556992636349" target="_blank" class="nav-btn px-4 py-1 text-[10px] border-purple-500 text-purple-400">WHATSAPP</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-5xl">
        <div class="border-neon p-8 rounded-2xl bg-black">
            <h2 class="text-lg font-bold text-[#00ff00] mb-4">Security_Shield</h2>
            <div class="bg-white/5 p-6 rounded-lg">
                <p class="text-[9px] text-gray-500 mb-1 uppercase">BTC/USDT Live</p>
                <div id="btc-price" class="text-2xl font-bold text-[#00ff00]">CONECTANDO...</div>
            </div>
        </div>

        <div class="border-neon p-8 rounded-2xl bg-black">
            <h2 class="text-lg font-bold mb-4 uppercase">Active_Solutions</h2>
            <a href="https://github.com/VisualStudioandSecurity" target="_blank" class="block p-4 border border-[#00ff00]/30 text-center hover:bg-[#00ff00] hover:text-black transition-all">
                REPOS: <span id="repo-count">0</span>
            </a>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const btcDisplay = document.getElementById('btc-price');
            const repoDisplay = document.getElementById('repo-count');

            // Conexão Bitcoin
            const btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
            btcWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.c) {
                    btcDisplay.innerText = '$' + parseFloat(data.c).toLocaleString(undefined, { minimumFractionDigits: 2 });
                }
            };

            // Busca GitHub
            fetch('https://api.github.com/users/VisualStudioandSecurity')
                .then(r => r.json())
                .then(d => {
                    if (repoDisplay) repoDisplay.innerText = d.public_repos || '0';
                })
                .catch(() => { if (repoDisplay) repoDisplay.innerText = 'OFF'; });
        });
    </script>
</body>
</html>
