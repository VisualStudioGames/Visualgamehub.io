<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kv's Enterprise | Visual Studio Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .neon-border {
            border: 1px solid rgba(0, 255, 0, 0.1);
            transition: 0.3s;
        }

            .neon-border:hover {
                border-color: #00ff00;
                box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
                transform: translateY(-5px);
            }

        .bg-grid {
            background-image: radial-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
        }

        .loader {
            border-top-color: #00ff00;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="bg-grid">

    <nav class="border-b border-white/5 bg-black/80 backdrop-blur-lg sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter text-[#00ff00]">KV'S ENTERPRISE</h1>

            <div id="btc-ticker" class="hidden md:flex items-center space-x-3 font-mono text-[10px] bg-white/5 px-4 py-1.5 rounded-full border border-white/10">
                <span class="text-gray-500 uppercase">BTC/USDT</span>
                <span id="btc-price" class="text-[#00ff00] font-bold tracking-widest text-xs">LOADING...</span>
                <span id="btc-change" class="font-bold"></span>
            </div>

            <div class="space-x-6 text-[10px] font-mono uppercase tracking-widest text-gray-500">
                <a href="https://github.com/kventerprise" target="_blank" class="hover:text-[#00ff00] transition-colors"><i class="fa-brands fa-github"></i> GitHub</a>
            </div>
        </div>
    </nav>

    <header class="py-24 px-6 text-center border-b border-white/5">
        <div class="inline-block px-4 py-1 border border-[#00ff00]/20 text-[#00ff00] text-[9px] font-mono mb-6 uppercase tracking-[0.4em] rounded-full bg-[#00ff00]/5">
            System Status: Operational
        </div>
        <h2 class="text-6xl md:text-8xl font-black mb-6 italic tracking-tighter uppercase leading-none">
            Visual <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00ff00] to-emerald-500">Studio Games</span>
        </h2>
        <p class="max-w-xl mx-auto text-gray-400 font-light text-sm md:text-base leading-relaxed uppercase tracking-wide">
            Desenvolvimento de Softwares, Games e Trading Systems de Alta Performance.
        </p>
    </header>

    <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <div class="neon-border bg-[#0a0a0a]/80 p-8 rounded-lg relative group flex flex-col justify-between">
            <div>
                <div class="flex justify-between items-start mb-6">
                    <i class="fa-solid fa-crosshairs text-[#00ff00] text-3xl opacity-50 group-hover:opacity-100 transition-opacity"></i>
                    <span class="text-[8px] bg-[#00ff00]/10 text-[#00ff00] px-2 py-0.5 rounded uppercase font-bold tracking-widest">Live App</span>
                </div>
                <h3 class="text-2xl font-black mb-3 italic tracking-tight">SHORT SNIPER</h3>
                <p class="text-xs text-gray-500 leading-relaxed mb-8 uppercase tracking-wider">Monitoramento avançado de Bitcoin focado em operações de Short com indicadores customizados.</p>
            </div>
            <button id="open-short-sniper" class="w-full py-3 bg-white/5 border border-white/10 text-[10px] font-mono text-[#00ff00] uppercase tracking-widest hover:bg-[#00ff00] hover:text-black transition-all font-bold">Launch Interface _</button>
        </div>

        <div class="neon-border bg-[#0a0a0a]/80 p-8 rounded-lg flex flex-col justify-between">
            <div>
