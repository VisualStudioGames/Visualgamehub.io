<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Designer & Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: #000 !important; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* TELAS COM DISPLAY NONE POR PADRÃO */
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* FORÇAR A TELA DE LOGIN A APARECER PRIMEIRO */
        #login-screen {
            display: flex;
        }

        .chroma {
            color: #39FF14;
            text-shadow: 0 0 10px #39FF14;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; 
        }

        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; }

        .btn-main { 
            width: 100%; max-width: 250px; padding: 15px; 
            background: #fff; color: #000; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .btn-nav { 
            background: none; border: 1px solid #444; color: #888; 
            padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.7rem;
        }

        input { 
            width: 100%; max-width: 250px; padding: 12px; 
            background: #111; border: 1px solid #333; color: #fff; 
            text-align: center; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h1 class="chroma">VISUAL STUDIO GAMES</h1>
        <input type="password" id="passInput" placeholder="PASSWORD">
        <button type="button" class="btn-main" onclick="unlock()">ENTER SYSTEM</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 class="chroma" style="font-size: 0.9rem;">HUB_PRINCIPAL</h2>
        <div class="grid">
            <div class="card"><h3>SNAKE</h3><button class="btn-nav" onclick="window.location.href='snake.html'">LAUNCH</button></div>
            <div class="card"><h3>DRIFT</h3><button class="btn-nav" onclick="window.location.href='carro.html'">LAUNCH</button></div>
            <div class="card" style="border-color: #00d4ff;">
                <h3 style="color:#00d4ff;">SAMPLES</h3>
                <button class="btn-nav" style="color:#39FF14;" onclick="window.location.href='exemplo1.html'">DARK</button>
                <button class="btn-nav" style="color:#007bff;" onclick="window.location.href='exemplo2.html'">CLEAN</button>
                <button class="btn-nav" style="color:#fff;" onclick="window.location.href='exemplo3.html'">TECH</button>
            </div>
            <div class="card">
                <h3>CONTACT</h3>
                <button class="btn-nav" style="border-color:#39FF14; color:#39FF14;" onclick="window.location.href='https://wa.me/5569992636349'">WHATSAPP</button>
            </div>
        </div>
        <button class="btn-nav" style="width: auto; margin-top: 20px;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        function unlock() {
            // Esconde o Login e Mostra o Hub
            document.getElementById('login-screen').style.setProperty('display', 'none', 'important');
            document.getElementById('hub-screen').style.setProperty('display', 'flex', 'important');
        }

        // Atalho tecla Enter
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
