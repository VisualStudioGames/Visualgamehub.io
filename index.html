<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Vanguard Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* TELA PRETA (VÉU) */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #39FF14; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
            transition: 0.8s; cursor: pointer;
        }

        /* HUB PRINCIPAL (Sempre "Pronto") */
        #hub-screen { 
            width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; text-align: center;
        }

        .chroma { color: #39FF14; text-shadow: 0 0 10px #39FF14; margin-bottom: 30px; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; border-radius: 12px; }
        
        button { background: none; border: 1px solid #333; color: #888; padding: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; margin-top: 10px; transition: 0.3s; }
        button:hover { border-color: #39FF14; color: #39FF14; }

        .contact-btn { background: #fff; color: #000; font-weight: bold; margin-top: 40px; width: 250px; border: none; }
        .contact-btn:hover { background: #39FF14; box-shadow: 0 0 20px #39FF14; }

        .footer-nav { position: absolute; bottom: 20px; display: flex; gap: 30px; font-size: 0.6rem; color: #333; text-transform: uppercase; }
        .footer-nav span:hover { color: #39FF14; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="this.style.display='none'">
        <p style="font-family: 'JetBrains Mono';">> INITIALIZING_SYSTEM...</p>
        <p style="font-size: 0.5rem; color: #444; margin-top: 20px;">[ CLIQUE PARA ENTRAR ]</p>
    </div>

    <div id="hub-screen">
        <h1 class="chroma">VANGUARD_CORE_HUB</h1>
        
        <div class="grid">
            <div class="card" style="border-color: #ff3131;">
                <h3 style="color:#ff3131; font-size:0.7rem;">SECURITY_SHIELD</h3>
                <div id="st" style="margin:20px 0; font-size:0.6rem; color:#ff3131; font-family:'JetBrains Mono';">> IDLE...</div>
                <button style="color:#ff3131; border-color:#ff3131;" onclick="document.getElementById('st').innerHTML='> 100% SECURE'; document.getElementById('st').style.color='#39FF14'">RUN_SCAN</
