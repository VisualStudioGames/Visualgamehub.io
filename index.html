<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV's Enterprise | Game Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="screen-entry" class="active">
        <div class="glow-container">
            <h1 class="neon-title">VANGUARDS VISUAL</h1>
            <p class="subtitle">EXPERIENCE THE FUTURE OF GAMING</p>
            <button id="btn-start" class="neon-button">ENTRAR NO HUB</button>
        </div>
    </section>

    <section id="screen-hub">
        <nav class="navbar">
            <h2 class="neon-logo">KV's ENTERPRISE</h2>
        </nav>
        
        <div class="game-grid">
            <div class="game-card">
                <div class="game-thumb">🐍</div>
                <h3>Neon Snake</h3>
                <p>O clássico em 2D.</p>
                <button class="play-btn">JOGAR</button>
            </div>

            <div class="game-card">
                <div class="game-thumb">🎯</div>
                <h3>Short Sniper</h3>
                <p>Treine seus reflexos.</p>
                <button class="play-btn">JOGAR</button>
            </div>

            <div class="game-card">
                <div class="game-thumb">💎</div>
                <h3>Meme Quest</h3>
                <p>Aventura e zueira.</p>
                <button class="play-btn">JOGAR</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
