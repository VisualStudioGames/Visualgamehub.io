<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio & Security | Intelligence Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0c10;
            --card: #161b22;
            --text: #c9d1d9;
            --header: #f0f6fc;
            --accent-green: #238636;
            --accent-blue: #58a6ff;
            --accent-gold: #f3ba2f;
            --border: #30363d;
            --code-bg: #010409;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* --- Header Minimalista Otimizado --- */
        header {
            position: relative;
            height: 400px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--accent-blue);
            background-color: #000;
        }

        .header-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: 1;
            object-fit: cover;
            opacity: 0.25;
            filter: brightness(0.4) contrast(1.4);
        }

        .header-content {
            position: relative;
            z-index: 2;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px 35px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo { 
            font-family: 'Poppins', sans-serif; 
            font-size: 1.8rem; 
            color: var(--header); 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .logo span { color: var(--accent-blue); }

        /* --- Banner de Status Real --- */
        .status-bar {
            background: #0d1117;
            border-bottom: 1px solid rgba(88, 166, 255, 0.2);
            padding: 10px 20px;
            display: flex;
            justify-content: space-around;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #8b949e;
            overflow-x: auto;
        }
        .status-item .label { color: var(--accent-blue); font-weight: bold; }
        .status-item .val { color: #fff; margin-left: 5px; }

        /* --- Seção de Serviços --- */
        .services-section { padding: 60px 0; background: #010409; }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .service-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .service-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
        .service-card h3 { color: var(--header); margin-top: 0; font-size: 1.1rem; }
        .service-card .price { 
            display: block; 
            margin-top: 15px; 
            color: var(--accent-blue); 
            font-weight: bold; 
            font-size: 1.2rem; 
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* ... Estilos anteriores de artigos e glossário mantidos ... */
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 40px; }
        .featured-article { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .article-body { padding: 25px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; margin-bottom: 12px; background: var(--accent-green); color: white; }
        .badge-alert { background: #d73a49; }
        
        footer { text-align: center; padding: 40px; background: #000; border-top: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <video autoplay loop muted playsinline class="header-video">
        <source src="assets/tech_eye_background.mp4" type="video/mp4">
    </video>
    <div class="header-content">
        <h1 class="logo">Visual Studio <span>& Security</span></h1>
        <p style="font-size: 0.85rem; margin-top: 5px; opacity: 0.8;">Hub de Inteligência em Defesa Digital</p>
    </div>
</header>

<div class="status-bar">
    <div class="status-item"><span class="label">STATUS:</span><span class="val" style="color: #3fb950;">OPERACIONAL</span></div>
    <div class="status-item"><span class="label">IP_CLIENTE:</span><span class="val" id="ip-addr">DETECTANDO...</span></div>
    <div class="status-item"><span class="label">LATENCIA:</span><span class="val" id="ping">0ms</span></div>
    <div class="status-item"><span class="label">SISTEMA:</span><span class="val">CORE_V3.2</span></div>
</div>

<div class="container">
    <section class="services-section">
        <h2 style="font-family: 'JetBrains Mono'; color: var(--accent-blue);">_serviços_especializados</h2>
        <div class="services-grid">
            <div class="service-card">
                <h3>Auditoria de Segurança</h3>
                <p style="font-size: 0.9rem;">Pentest completo e análise de vulnerabilidades em infraestrutura.</p>
                <span class="price">R$ 1.500,00</span>
            </div>
